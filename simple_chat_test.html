<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Simple Chat</title>
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --user-msg-bg: #3b82f6;
            --ai-msg-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .chat-header {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 20px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 15px;
            background: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: var(--accent-hover);
        }
        
        button:active {
            transform: scale(0.95);
        }

        .typing-indicator {
            align-self: flex-start;
            color: #94a3b8;
            font-size: 0.9rem;
            display: none;
            padding: 0 10px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">✨ ระบบแชท AI ง่ายๆ ด้วย Gemini</div>
    <div class="chat-box" id="chat-box">
        <div class="message ai-message">สวัสดีครับ! ผมคือ AI Assistant คุณมีอะไรให้ผมช่วยไหมครับ?</div>
    </div>
    <div class="typing-indicator" id="typing-indicator">AI กำลังพิมพ์...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">ส่ง</button>
    </div>
</div>

<script type="module">
    import { GoogleGenAI } from '@google/genai';

    const API_KEY = "AIzaSyDL3XS3KNdJ94oJz93hij_ca7Ygz6KI0IQ";
    const ai = new GoogleGenAI({ apiKey: API_KEY });

    // เก็บประวัติการแชท (Chat History)
    let chatSession = ai.chats.create({ model: 'gemini-2.5-flash' });

    window.sendMessage = async function() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        appendMessage("user", message);
        inputField.value = "";
        
        const typingIndicator = document.getElementById("typing-indicator");
        typingIndicator.style.display = "block";
        scrollToBottom();

        try {
            const response = await chatSession.sendMessage({ message: message });
            typingIndicator.style.display = "none";
            appendMessage("ai", response.text);
        } catch (error) {
            console.error(error);
            typingIndicator.style.display = "none";
            appendMessage("ai", "❌ ขออภัย เกิดข้อผิดพลาดในการเชื่อมต่อ API");
        }
    };

    window.handleKeyPress = function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    };

    function appendMessage(role, text) {
        const chatBox = document.getElementById("chat-box");
        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${role}-message`;
        messageDiv.innerText = text;
        chatBox.appendChild(messageDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        const chatBox = document.getElementById("chat-box");
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
