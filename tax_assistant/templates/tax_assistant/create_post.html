{% extends 'tax_assistant/base.html' %}

{% block title %}New Post{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Back Button -->
    <a href="{% url 'community_feed' %}" class="inline-flex items-center space-x-2 text-neutral-400 hover:text-indigo-500 transition-colors mb-8 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        <span class="text-sm font-medium">Back to Community</span>
    </a>

    <div class="bg-white dark:bg-neutral-900 rounded-[2.5rem] shadow-2xl border border-neutral-100 dark:border-neutral-800 overflow-hidden">
        <div class="p-12">
            <div class="mb-10 border-b border-neutral-100 dark:border-neutral-800 pb-6">
                <h2 class="text-3xl font-bold text-neutral-900 dark:text-white tracking-tight mb-2">Create a Post</h2>
                <p class="text-neutral-400 font-light text-sm">Share your experiences, tips, or ask a question to the community.</p>
            </div>

            <form method="POST" class="space-y-8">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-widest ml-1">Title</label>
                    {{ form.title }}
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-widest ml-1">Content</label>
                    {{ form.content }}
                </div>

                <div class="pt-8">
                    <button type="submit" class="w-full bg-indigo-500 text-white font-bold py-4 rounded-2xl hover:bg-indigo-600 hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl shadow-indigo-500/20 flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                        <span>Publish Post</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
