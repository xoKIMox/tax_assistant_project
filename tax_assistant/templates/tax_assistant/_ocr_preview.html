<div class="bg-indigo-50 dark:bg-indigo-500/10 p-6 rounded-2xl border border-indigo-100 dark:border-indigo-500/20">
  <p class="text-indigo-600 dark:text-indigo-400 font-bold text-sm uppercase tracking-widest mb-2">AI Analysis Complete</p>
  <div class="grid grid-cols-2 gap-4 text-sm">
      <div>
          <p class="text-neutral-400 font-light uppercase tracking-tighter text-[10px]">Date</p>
          <p class="font-semibold text-neutral-900 dark:text-neutral-100">{{ date }}</p>
      </div>
      <div>
          <p class="text-neutral-400 font-light uppercase tracking-tighter text-[10px]">Amount</p>
          <p class="font-semibold text-neutral-900 dark:text-neutral-100">฿{{ amount }}</p>
      </div>
      <div class="col-span-2">
          <p class="text-neutral-400 font-light uppercase tracking-tighter text-[10px]">Category</p>
          <p class="font-semibold text-neutral-900 dark:text-neutral-100">{{ category }}</p>
      </div>
  </div>
</div>
