<button 
    hx-post="{% url 'like_post' post.id %}"
    hx-target="#like-button-container-{{ post.id }}"
    hx-swap="innerHTML"
    class="flex items-center space-x-2 px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 {% if is_liked %}bg-rose-50 text-rose-500 dark:bg-rose-500/10 dark:text-rose-400{% else %}bg-neutral-50 text-neutral-400 hover:bg-neutral-100 dark:bg-neutral-800 dark:hover:bg-neutral-700{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 {% if is_liked %}fill-current{% else %}fill-none{% endif %}" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
    </svg>
    <span>{{ like_count }}</span>
</button>
