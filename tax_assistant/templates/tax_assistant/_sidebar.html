<aside class="w-72 bg-neutral-50 dark:bg-neutral-900 border-r border-neutral-200 dark:border-neutral-800 flex flex-col hidden md:flex transition-colors duration-300">
    <div class="h-20 flex items-center px-8">
        <h1 class="text-xl font-bold tracking-tighter text-neutral-950 dark:text-white flex items-center space-x-2">
            <span class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white text-xs">TX</span>
            <span>TaxAI</span>
        </h1>
    </div>
    
    <nav class="flex-1 px-4 py-8 space-y-1">
        <a href="{% url 'dashboard' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 font-medium{% else %}text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span>Dashboard</span>
        </a>

        <a href="{% url 'chat_page' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.resolver_match.url_name == 'chat_page' or request.resolver_match.url_name == 'chat_page_with_id' %}bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 font-medium{% else %}text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
            <span>AI Assistant</span>
        </a>

        <a href="{% url 'community_feed' %}" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 group {% if 'community' in request.path %}bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 font-medium{% else %}text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-900 dark:hover:text-neutral-100{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" />
            </svg>
            <span>Community</span>
        </a>

        <!-- Chat Sessions List (Only on Chat Page) -->
        {% if sessions %}
        <div class="mt-10 pt-6 border-t border-neutral-100 dark:border-neutral-800">
            <div class="flex items-center justify-between px-4 mb-4">
                <h3 class="text-[10px] uppercase tracking-widest text-neutral-400 font-bold">Your Chats</h3>
                <a href="{% url 'create_chat' %}" class="p-1.5 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors shadow-lg shadow-indigo-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </a>
            </div>
            <div class="space-y-1 overflow-y-auto max-h-[40vh] px-2">
                {% for s in sessions %}
                <div class="group flex items-center justify-between px-3 py-2.5 rounded-xl transition-all duration-200 {% if s.id == session.id %}bg-white dark:bg-neutral-800 shadow-sm border border-neutral-100 dark:border-neutral-700{% else %}hover:bg-neutral-100 dark:hover:bg-neutral-800/50{% endif %}">
                    <a href="{% url 'chat_page_with_id' s.id %}" class="flex-1 min-w-0 text-sm {% if s.id == session.id %}text-neutral-900 dark:text-white font-semibold{% else %}text-neutral-500{% endif %} truncate mr-2">
                        {{ s.title }}
                    </a>
                    <div class="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <!-- Rename (Simplified: triggers a prompt for now) -->
                        <button onclick="const newTitle = prompt('Rename chat:', '{{ s.title }}'); if(newTitle) { const f = document.createElement('form'); f.method='POST'; f.action='{% url 'rename_chat' s.id %}'; const i = document.createElement('input'); i.name='title'; i.value=newTitle; f.appendChild(i); const c = document.createElement('input'); c.type='hidden'; c.name='csrfmiddlewaretoken'; c.value='{{ csrf_token }}'; f.appendChild(c); document.body.appendChild(f); f.submit(); }" class="p-1 text-neutral-400 hover:text-indigo-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                        <!-- Delete -->
                        <a href="{% url 'delete_chat' s.id %}" onclick="return confirm('Delete this chat?')" class="p-1 text-neutral-400 hover:text-rose-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </nav>

    <div class="p-6">
        {% if user.is_authenticated %}
        <div class="bg-white dark:bg-neutral-800 p-4 rounded-2xl border border-neutral-100 dark:border-neutral-700 shadow-sm">
            <a href="{% url 'profile_settings' %}" class="flex items-center space-x-3 mb-4 group block">
                <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-indigo-500/20 group-hover:scale-105 transition-transform">
                    {{ user.username.0|upper }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-neutral-900 dark:text-neutral-100 truncate group-hover:text-indigo-500 transition-colors">{{ user.username }}</p>
                    <p class="text-[10px] uppercase tracking-widest text-neutral-400 font-medium">View Profile</p>
                </div>
            </a>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="w-full group flex items-center justify-center space-x-2 py-2 px-3 rounded-xl text-neutral-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span class="text-xs font-medium">Log out</span>
                </button>
            </form>
        </div>
        {% else %}
        <div class="text-[10px] uppercase tracking-[0.2em] text-neutral-400 text-center font-light">
            Powered by Ollama
        </div>
        {% endif %}
    </div>
</aside>
