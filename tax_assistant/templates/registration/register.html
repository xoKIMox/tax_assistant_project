<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | TaxAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    </style>
</head>
<body class="bg-white dark:bg-neutral-950 flex items-center justify-center min-h-screen p-6 font-sans py-12">
    <div class="bg-neutral-50 dark:bg-neutral-900 p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-neutral-100 dark:border-neutral-800 transition-all duration-500">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-2xl mx-auto mb-6 shadow-xl shadow-emerald-500/20">
                <span class="font-bold tracking-tighter text-white">TX</span>
            </div>
            <h1 class="text-3xl font-bold text-neutral-900 dark:text-white tracking-tight">Create account</h1>
            <p class="text-neutral-400 mt-2 font-light">Join us to simplify your tax management.</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-widest ml-1">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <p class="text-[10px] text-neutral-400 mt-1 leading-relaxed">{{ field.help_text }}</p>
                {% endif %}
                {% for error in field.errors %}
                <p class="text-xs text-rose-500 mt-1 font-medium">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 font-bold py-4 px-6 rounded-2xl hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl shadow-neutral-900/10 mt-4">
                Sign Up
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-sm text-neutral-400">
                Already have an account? <a href="{% url 'login' %}" class="text-indigo-500 font-bold hover:underline">Sign in instead</a>
            </p>
        </div>
    </div>
    
    <style>
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            background-color: white;
            border-radius: 1.25rem;
            border: none;
            padding: 1rem 1.25rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            color: #171717;
            transition: all 0.3s ease;
        }
        .dark input[type="text"], .dark input[type="password"], .dark input[type="email"] {
            background-color: #262626;
            color: #f5f5f5;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        ul.errorlist {
            color: #f43f5e;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 0.5rem;
            list-style: none;
            padding: 0;
        }
    </style>
</body>
</html>
