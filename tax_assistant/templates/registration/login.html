<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaxAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    </style>
</head>
<body class="bg-white dark:bg-neutral-950 flex items-center justify-center min-h-screen p-6 font-sans">
    <div class="bg-neutral-50 dark:bg-neutral-900 p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-neutral-100 dark:border-neutral-800 transition-all duration-500">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-indigo-500 rounded-3xl flex items-center justify-center text-white text-2xl mx-auto mb-6 shadow-xl shadow-indigo-500/20">
                <span class="font-bold tracking-tighter">TX</span>
            </div>
            <h1 class="text-3xl font-bold text-neutral-900 dark:text-white tracking-tight">Welcome back</h1>
            <p class="text-neutral-400 mt-2 font-light">Enter your details to manage your taxes.</p>
        </div>
        
        <form method="post" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            {% if form.errors %}
                <div class="bg-rose-50 dark:bg-rose-500/10 text-rose-500 p-4 rounded-2xl text-xs font-medium border border-rose-100 dark:border-rose-500/20">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}
            
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-widest ml-1">Username</label>
                <input type="text" name="username" class="w-full bg-white dark:bg-neutral-800 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-indigo-500/20 dark:focus:ring-indigo-500/10 text-neutral-900 dark:text-neutral-100 transition-all shadow-sm" placeholder="your_username" required>
            </div>
            
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-widest ml-1">Password</label>
                <input type="password" name="password" class="w-full bg-white dark:bg-neutral-800 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-indigo-500/20 dark:focus:ring-indigo-500/10 text-neutral-900 dark:text-neutral-100 transition-all shadow-sm" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 font-bold py-4 px-6 rounded-2xl hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl shadow-neutral-900/10">
                Sign In
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-sm text-neutral-400">
                Don't have an account? <a href="{% url 'register' %}" class="text-indigo-500 font-bold hover:underline">Sign up for free</a>
            </p>
        </div>
    </div>
</body>
</html>
